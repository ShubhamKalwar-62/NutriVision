<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0091ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6d00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9100;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050a14;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Apple body - left half (cyan) -->
  <path d="M256 420 C160 420 100 340 100 260 C100 180 140 140 180 120 C200 110 230 108 256 130" 
        fill="none" stroke="url(#cyanGlow)" stroke-width="4" filter="url(#glow)"/>
  <!-- Apple body - right half (orange) -->
  <path d="M256 420 C352 420 412 340 412 260 C412 180 372 140 332 120 C312 110 282 108 256 130" 
        fill="none" stroke="url(#orangeGlow)" stroke-width="4" filter="url(#glow)"/>
  <!-- Stem -->
  <path d="M256 130 C256 110 258 90 270 75" fill="none" stroke="url(#cyanGlow)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Leaf -->
  <path d="M270 75 C290 65 320 70 330 90 C310 85 285 80 270 75Z" 
        fill="none" stroke="url(#cyanGlow)" stroke-width="3" filter="url(#glow)"/>
  <!-- Internal wireframe lines (cyan) -->
  <line x1="140" y1="200" x2="200" y2="280" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="280" x2="160" y2="360" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="200" x2="200" y2="180" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="180" x2="200" y2="280" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="280" x2="256" y2="350" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="200" x2="200" y2="280" stroke="#00bcd4" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="180" x2="256" y2="200" stroke="#00bcd4" stroke-width="1.5" opacity="0.5"/>
  <!-- Internal wireframe lines (orange) -->
  <line x1="372" y1="200" x2="312" y2="280" stroke="#ff6d00" stroke-width="1.5" opacity="0.6"/>
  <line x1="312" y1="280" x2="352" y2="360" stroke="#ff6d00" stroke-width="1.5" opacity="0.6"/>
  <line x1="372" y1="200" x2="312" y2="180" stroke="#ff6d00" stroke-width="1.5" opacity="0.6"/>
  <line x1="312" y1="180" x2="312" y2="280" stroke="#ff6d00" stroke-width="1.5" opacity="0.5"/>
  <line x1="312" y1="280" x2="256" y2="350" stroke="#ff6d00" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="200" x2="312" y2="280" stroke="#ff9100" stroke-width="1.5" opacity="0.4"/>
  <line x1="312" y1="180" x2="256" y2="200" stroke="#ff9100" stroke-width="1.5" opacity="0.5"/>
  <!-- Center cross wireframe -->
  <line x1="200" y1="180" x2="312" y2="180" stroke="#00bcd4" stroke-width="1.5" opacity="0.35"/>
  <line x1="256" y1="130" x2="256" y2="420" stroke="#00bcd4" stroke-width="1" opacity="0.2"/>
  <!-- Node dots (cyan) -->
  <circle cx="140" cy="200" r="4" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="200" cy="180" r="4" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="200" cy="280" r="5" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="160" cy="360" r="4" fill="#00e5ff" filter="url(#glow)"/>
  <circle cx="256" cy="130" r="4" fill="#00e5ff" filter="url(#glow)"/>
  <!-- Node dots (orange) -->
  <circle cx="372" cy="200" r="4" fill="#ff6d00" filter="url(#glow)"/>
  <circle cx="312" cy="180" r="4" fill="#ff6d00" filter="url(#glow)"/>
  <circle cx="312" cy="280" r="5" fill="#ff6d00" filter="url(#glow)"/>
  <circle cx="352" cy="360" r="4" fill="#ff6d00" filter="url(#glow)"/>
  <!-- Center nodes -->
  <circle cx="256" cy="200" r="5" fill="#00bcd4" opacity="0.8" filter="url(#glow)"/>
  <circle cx="256" cy="350" r="5" fill="#ff9100" opacity="0.8" filter="url(#glow)"/>
  <!-- Horizontal scan line -->
  <line x1="60" y1="260" x2="452" y2="260" stroke="#00e5ff" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
</svg>
